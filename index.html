<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator V8 Ultimate</title>
<style>
body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e1b4b,#311042);
display:flex;justify-content:center;align-items:center;
min-height:100vh;margin:0;padding:20px;color:#fff;
}
.container{
width:100%;max-width:500px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(12px);
border-radius:20px;padding:24px;
}
input,button{padding:10px;border-radius:10px;border:none}
button{cursor:pointer;width:100%;margin-top:12px}
.history{margin-top:20px}
</style>
</head>
<body>
<div class="container">
<h2>Password Generator V8 Ultimate</h2>
<p>Versi tanpa menu "Fitur Lainnya".</p>
<input id="userId" placeholder="User ID" style="width:100%">
<button onclick="generate()">Generate</button>
<div id="result" style="margin-top:15px"></div>
<div class="history">
<h3>History 5 Password Terakhir</h3>
<ol id="history"></ol>
</div>
</div>
<script>
const historyList=[];
function rand(len=8){
 const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
 let out='';
 crypto.getRandomValues(new Uint32Array(len)).forEach(v=>out+=chars[v%chars.length]);
 return out;
}
function generate(){
 const pw=rand(8);
 document.getElementById('result').innerText='Password: '+pw;
 historyList.unshift(pw);
 if(historyList.length>5) historyList.pop();
 document.getElementById('history').innerHTML=historyList.map(x=>`<li>${x}</li>`).join('');
}
</script>
</body>
</html>

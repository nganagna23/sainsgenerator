<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exchanger</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e1b4b,#311042);color:#fff}
.sidebar{position:fixed;left:-280px;top:0;width:260px;height:100%;background:#111827;transition:.3s;padding:20px;z-index:10}
.sidebar.open{left:0}
.menu-btn{position:fixed;left:15px;top:15px;background:#6366f1;padding:10px 14px;border-radius:10px;cursor:pointer;z-index:11}
.wrap{max-width:1100px;margin:70px auto;padding:20px;background:rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px}
button{background:#6366f1;color:#fff;cursor:pointer}
.card{background:rgba(255,255,255,.08);padding:12px;border-radius:12px;margin-top:10px}
.toast{position:fixed;right:20px;bottom:20px;background:#111827;padding:10px 15px;border-radius:10px;display:none}

.menu-wrapper{position:fixed;top:15px;left:15px;z-index:1000}
.menu-tooltip{font-size:12px;text-align:center;margin-top:6px}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;visibility:hidden;transition:.3s;z-index:9}
.menu-overlay.show{opacity:1;visibility:visible}
.menu-btn{background:rgba(255,255,255,.12)!important;backdrop-filter:blur(12px);display:flex;flex-direction:column;gap:4px}
.menu-btn .bar{width:22px;height:3px;background:#fff;border-radius:3px;transition:.3s}
.menu-btn.open .bar:nth-child(1){transform:translateY(7px) rotate(45deg)}
.menu-btn.open .bar:nth-child(2){opacity:0}
.menu-btn.open .bar:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
</style>
</head>
<body>
<div class="menu-wrapper"><div class="menu-btn" id="menuBtn" onclick="toggleMenu()"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div><div class="menu-tooltip">Cek fitur lainnya</div></div><div class="menu-overlay" id="menuOverlay"></div>
<div class="sidebar" id="sidebar">
<h3>Menu</h3>
<p>💱 Exchange</p><p>⭐ Favorites</p><p>📜 History</p><p>⚙ Settings</p>
</div>

<div class="wrap">
<h2>💱 Exchange V11.3 Ultimate Global Edition Full Integration</h2>

<input id="search" placeholder="Search Country / Currency">

<div class="grid">
<select id="from"></select>
<select id="to"></select>
</div>

<input id="amount" type="number" value="100">

<div class="grid">
<button onclick="swapCurrency()">⇄ Swap</button>
<button onclick="refreshRate()">🔄 Refresh Rate</button>
</div>

<div class="grid">
<select id="precision">
<option value="2">2 Decimals</option>
<option value="4">4 Decimals</option>
<option value="6">6 Decimals</option>
</select>
<button onclick="saveFavorite()">⭐ Save Favorite</button>
</div>

<div class="card" id="result">Ready</div>
<div class="card" id="rateInfo"></div>
<div class="card" id="updated"></div>

<div class="card"><h3>⭐ Favorites</h3><div id="favorites"></div><button onclick="clearFavorites()">Clear Favorites</button></div>
<div class="card"><h3>📜 History</h3><div id="history"></div><button onclick="clearHistory()">Clear History</button></div>
<div class="card"><h3>🌍 Multi Conversion</h3><div id="multi"></div></div>

<button onclick="copyResult()">📋 Copy Result</button>
</div>

<div class="toast" id="toast"></div>

<script>

const db=[
["AFGHANISTAN","AFN"],["ALBANIA","ALL"],["ALGERIA","DZD"],["ANGOLA","AOA"],["ARGENTINA","ARS"],
["ARMENIA","AMD"],["AUSTRALIA","AUD"],["AZERBAIJAN","AZN"],["BAHAMAS","BSD"],["BAHRAIN","BHD"],
["BANGLADESH","BDT"],["BARBADOS","BBD"],["BELARUS","BYN"],["BELIZE","BZD"],["BERMUDA","BMD"],
["BHUTAN","BTN"],["BOLIVIA","BOB"],["BOSNIA AND HERZEGOVINA","BAM"],["BOTSWANA","BWP"],["BRAZIL","BRL"],
["BRUNEI","BND"],["BULGARIA","BGN"],["BURUNDI","BIF"],["CAMBODIA","KHR"],["CANADA","CAD"],
["CAPE VERDE","CVE"],["CAYMAN ISLANDS","KYD"],["CHILE","CLP"],["CHINA","CNY"],["COLOMBIA","COP"],
["COSTA RICA","CRC"],["CROATIA","EUR"],["CUBA","CUP"],["CZECH REPUBLIC","CZK"],["DENMARK","DKK"],
["DOMINICAN REPUBLIC","DOP"],["EGYPT","EGP"],["ETHIOPIA","ETB"],["EURO","EUR"],["FIJI","FJD"],
["GEORGIA","GEL"],["GHANA","GHS"],["GUATEMALA","GTQ"],["HONG KONG","HKD"],["HUNGARY","HUF"],
["ICELAND","ISK"],["INDIA","INR"],["INDONESIA","IDR"],["IRAN","IRR"],["IRAQ","IQD"],
["ISRAEL","ILS"],["JAMAICA","JMD"],["JAPAN","JPY"],["JORDAN","JOD"],["KAZAKHSTAN","KZT"],
["KENYA","KES"],["KUWAIT","KWD"],["KYRGYZSTAN","KGS"],["LAOS","LAK"],["LEBANON","LBP"],
["LIBYA","LYD"],["MACAU","MOP"],["MADAGASCAR","MGA"],["MALAWI","MWK"],["MALAYSIA","MYR"],
["MALDIVES","MVR"],["MAURITIUS","MUR"],["MEXICO","MXN"],["MOLDOVA","MDL"],["MONGOLIA","MNT"],
["MOROCCO","MAD"],["MYANMAR","MMK"],["NAMIBIA","NAD"],["NEPAL","NPR"],["NEW ZEALAND","NZD"],
["NIGERIA","NGN"],["NORWAY","NOK"],["OMAN","OMR"],["PAKISTAN","PKR"],["PANAMA","PAB"],
["PARAGUAY","PYG"],["PERU","PEN"],["PHILIPPINES","PHP"],["POLAND","PLN"],["QATAR","QAR"],
["ROMANIA","RON"],["RUSSIA","RUB"],["RWANDA","RWF"],["SAUDI ARABIA","SAR"],["SERBIA","RSD"],
["SEYCHELLES","SCR"],["SINGAPORE","SGD"],["SOUTH AFRICA","ZAR"],["SOUTH KOREA","KRW"],
["SRI LANKA","LKR"],["SWEDEN","SEK"],["SWITZERLAND","CHF"],["TAIWAN","TWD"],["TAJIKISTAN","TJS"],
["TANZANIA","TZS"],["THAILAND","THB"],["TONGA","TOP"],["TRINIDAD AND TOBAGO","TTD"],
["TUNISIA","TND"],["TURKEY","TRY"],["UGANDA","UGX"],["UKRAINE","UAH"],
["UNITED ARAB EMIRATES","AED"],["UNITED KINGDOM","GBP"],["UNITED STATES","USD"],
["URUGUAY","UYU"],["UZBEKISTAN","UZS"],["VIETNAM","VND"],["YEMEN","YER"],
["ZAMBIA","ZMW"],["CFA FRANC BEAC","XAF"],["CFA FRANC BCEAO","XOF"],["CFP FRANC","XPF"]
];

const from=document.getElementById('from');
const to=document.getElementById('to');
db.sort().forEach(c=>{
from.innerHTML+=`<option value="${c[1]}">${c[0]} (${c[1]})</option>`;
to.innerHTML+=`<option value="${c[1]}">${c[0]} (${c[1]})</option>`;
});
from.value=localStorage.lastFrom||'USD';
to.value=localStorage.lastTo||'IDR';

function toggleMenu(){sidebar.classList.toggle('open');document.getElementById('menuBtn').classList.toggle('open');document.getElementById('menuOverlay').classList.toggle('show');}
document.addEventListener('click',e=>{
if(!e.target.closest('.sidebar')&&!e.target.closest('.menu-btn')) sidebar.classList.remove('open');
});

function showToast(t){toast.innerText=t;toast.style.display='block';setTimeout(()=>toast.style.display='none',2000);}

async function getRates(base,force=false){
const key='rate_'+base;
const c=localStorage.getItem(key);
if(c&&!force){const o=JSON.parse(c);if(Date.now()-o.time<300000)return o.data;}
const r=await fetch('https://open.er-api.com/v6/latest/'+base);
const d=await r.json();
localStorage.setItem(key,JSON.stringify({time:Date.now(),data:d}));
return d;
}

async function convert(force=false){
localStorage.lastFrom=from.value; localStorage.lastTo=to.value;
const d=await getRates(from.value,force);
const dec=+precision.value;
const amt=parseFloat(String(amount.value).replace(/,/g,''))||1;
const rate=d.rates[to.value];
const total=amt*rate;
result.innerHTML=`${amt} ${from.value} = ${total.toLocaleString(undefined,{maximumFractionDigits:dec})} ${to.value}`;
rateInfo.innerHTML=`1 ${from.value} = ${rate.toFixed(dec)} ${to.value}<br>1 ${to.value} = ${(1/rate).toFixed(dec)} ${from.value}`;
updated.innerHTML='Updated: '+new Date().toLocaleString();
multi.innerHTML=['USD','EUR','GBP','JPY','IDR','SGD'].filter(x=>d.rates[x]).map(x=>`${x}: ${(amt*d.rates[x]).toLocaleString()}`).join('<br>');
let h=JSON.parse(localStorage.hist||'[]'); h.unshift(result.innerText); h=h.slice(0,20); localStorage.hist=JSON.stringify(h); renderHistory();
}

function swapCurrency(){let t=from.value;from.value=to.value;to.value=t;convert();}
function refreshRate(){convert(true);}
function copyResult(){navigator.clipboard.writeText(result.innerText);showToast('Copied Successfully');}

function saveFavorite(){
let f=JSON.parse(localStorage.fav||'[]');
let p=from.value+'-'+to.value;
if(!f.includes(p))f.push(p);
localStorage.fav=JSON.stringify(f);
renderFavorites();
}
function renderFavorites(){
let f=JSON.parse(localStorage.fav||'[]');
favorites.innerHTML=f.map(v=>`<div><button onclick="loadFav('${v}')">${v}</button></div>`).join('');
}
function loadFav(v){let p=v.split('-');from.value=p[0];to.value=p[1];convert();}
function clearFavorites(){localStorage.removeItem('fav');renderFavorites();}

function renderHistory(){history.innerHTML=(JSON.parse(localStorage.hist||'[]')).join('<br>');}
function clearHistory(){localStorage.removeItem('hist');renderHistory();}

search.addEventListener('input',()=>{
let q=search.value.toUpperCase();
[...from.options].forEach(o=>o.hidden=!o.text.includes(q));
[...to.options].forEach(o=>o.hidden=!o.text.includes(q));
});

document.addEventListener('keydown',e=>{if(e.key==='Enter')convert();});
amount.addEventListener('input',()=>{let cur=amount.value.replace(/,/g,'');if(cur!==''&&!isNaN(cur)){let p=cur.split('.');p[0]=Number(p[0]).toLocaleString('en-US');amount.value=p.join('.');}convert();});
precision.onchange=()=>convert();
from.onchange=()=>convert();
to.onchange=()=>convert();

renderFavorites();
renderHistory();
convert();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Rate Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#311042 100%);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;color:#fff}
.container{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);padding:30px;border-radius:24px;width:90%;max-width:520px}
.menu-btn{position:fixed;left:25px;top:25px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);width:50px;height:50px;border-radius:14px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;z-index:1001}
.bar{width:24px;height:3px;background:#fff}
.sidebar{position:fixed;left:-320px;top:0;width:280px;height:100vh;background:rgba(15,23,42,.9);padding:100px 24px;transition:.3s;z-index:1000}
.sidebar.open{left:0}
.sidebar a{display:block;color:#cbd5e1;text-decoration:none;padding:12px;border-radius:12px;margin:8px 0;background:rgba(255,255,255,.05)}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:none}
button.convert{background:#6366f1;color:white;font-weight:600}
.result{margin-top:15px;padding:15px;background:rgba(255,255,255,.05);border-radius:12px}
</style>
</head>
<body>
<div class="menu-btn" onclick="toggleMenu()"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
<div class="sidebar" id="sidebar">
<h3>Fitur Lainnya</h3>
<a href="index.html">🔐 Password Generator</a>
<a href="exchange.html">💱 Exchange Rate Converter</a>
</div>

<div class="container">
<h2>💱 Exchange Rate Converter</h2>
<input type="number" id="amount" value="100" placeholder="Amount">

<select id="from"></select>
<select id="to"></select>

<button class="convert" onclick="convert()">Convert</button>

<div class="result" id="result">Loading...</div>
<div id="updated"></div>
</div>

<script>
const currencies=["USD","IDR","EUR","GBP","JPY","SGD","MYR","THB","PHP","AUD","CAD","CHF","CNY","HKD","KRW","INR"];
const from=document.getElementById("from");
const to=document.getElementById("to");
currencies.forEach(c=>{
from.innerHTML+=`<option>${c}</option>`;
to.innerHTML+=`<option>${c}</option>`;
});
from.value="USD";
to.value="IDR";

function toggleMenu(){
document.getElementById("sidebar").classList.toggle("open");
}

async function convert(){
const amount=document.getElementById("amount").value||1;
const f=from.value;
const t=to.value;

const res=await fetch(`https://open.er-api.com/v6/latest/${f}`);
const data=await res.json();

const result=(amount*data.rates[t]);
document.getElementById("result").innerHTML=`${amount} ${f} = ${result.toLocaleString()} ${t}`;
document.getElementById("updated").innerHTML="Updated: "+new Date().toLocaleString();
}
convert();
</script>
</body>
</html>
